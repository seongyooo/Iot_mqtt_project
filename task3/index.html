<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    header h1 { font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; }
    .badge {
      font-size: 0.72rem; padding: 2px 8px;
      border-radius: 10px; background: #2a2a2a; color: #888;
    }
    .badge.live { background: #0a2a0a; color: #4caf50; }
    .badge.err  { background: #2a0a0a; color: #f44336; }
    #ws-badge { margin-left: auto; }

    .main {
      display: flex; flex: 1; overflow: hidden;
      gap: 1px; background: #222;
    }

    /* ── 카메라 그리드 ── */
    #cam-grid {
      flex: 1; display: grid;
      gap: 2px; background: #222;
      overflow: hidden;
    }
    .cam-cell {
      background: #111; display: flex;
      flex-direction: column; position: relative; overflow: hidden;
    }
    .cam-label {
      position: absolute; top: 6px; left: 8px; z-index: 2;
      font-size: 0.72rem; color: #ccc;
      background: rgba(0,0,0,0.55);
      padding: 2px 7px; border-radius: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .cam-label .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .cam-label .dot.live { background: #4caf50; }
    .cam-label .dot.err  { background: #f44336; }
    .cam-canvas-wrap {
      flex: 1; display: flex;
      align-items: center; justify-content: center; position: relative;
    }
    /* ── 카메라 180도 회전 ── */
    .cam-canvas {
      max-width: 100%; max-height: 100%; display: block;
      transform: rotate(180deg);
    }
    .no-signal  { position: absolute; color: #444; font-size: 0.82rem; }
    .cam-stat {
      padding: 3px 8px; background: #0e0e0e;
      border-top: 1px solid #1e1e1e;
      font-size: 0.68rem; color: #555;
      display: flex; gap: 12px; flex-shrink: 0;
    }
    .cam-stat b { color: #777; }

    /* ── 우측 패널: 이벤트 로그 + 아키텍처 ── */
    .right-panel {
      width: 340px; background: #111;
      display: flex; flex-direction: column;
      border-left: 1px solid #2a2a2a; flex-shrink: 0;
    }

    /* ── 이벤트 로그 (상단, 스크롤) ── */
    .event-header {
      font-size: 0.75rem; font-weight: 500; color: #666;
      padding: 8px 12px; border-bottom: 1px solid #1e1e1e;
      text-transform: uppercase; letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    #event-log {
      flex: 1; overflow-y: auto; padding: 4px 0; min-height: 0;
    }
    .ev {
      padding: 6px 12px; border-bottom: 1px solid #1a1a1a;
      font-size: 0.75rem; line-height: 1.4;
    }
    .ev .time { color: #444; font-size: 0.68rem; margin-top: 1px; }
    .ev.motion  { border-left: 2px solid #ff9800; }
    .ev.offline { border-left: 2px solid #f44336; }
    .ev.online  { border-left: 2px solid #4caf50; }
    .ev.route   { border-left: 2px solid #2196f3; }
    #event-log::-webkit-scrollbar { width: 3px; }
    #event-log::-webkit-scrollbar-thumb { background: #333; }

    /* ── 아키텍처 다이어그램 (하단 고정) ── */
    #arch-panel {
      flex-shrink: 0;
      background: #0d0d0d;
      border-top: 1px solid #2a2a2a;
      padding: 10px 12px;
    }
    .arch-title {
      font-size: 0.63rem; color: #444;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    #arch-svg { display: block; margin: 0 auto; }
    #route-info {
      margin-top: 8px; display: flex;
      flex-direction: column; gap: 3px;
    }
    .route-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.68rem; color: #555;
    }
    .route-cam  { color: #888; min-width: 28px; }
    .route-path { color: #4caf50; font-family: monospace; }
  </style>
</head>
<body>

<header>
  <h1>CCTV Monitor</h1>
  <span class="badge" id="ws-badge">연결 중...</span>
</header>

<div class="main">
  <!-- 카메라 그리드 -->
  <div id="cam-grid"></div>

  <!-- 우측 패널 -->
  <div class="right-panel">
    <!-- 이벤트 로그 (상단) -->
    <div class="event-header">Event Log</div>
    <div id="event-log"></div>

    <!-- 아키텍처 다이어그램 (하단) -->
    <div id="arch-panel">
      <div class="arch-title">Network Path</div>
      <svg id="arch-svg"
           viewBox="0 0 315 170"
           width="315" height="170"
           xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow" markerWidth="6" markerHeight="6"
                  refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#333"/>
          </marker>
          <marker id="arrow-active" markerWidth="6" markerHeight="6"
                  refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#4caf50"/>
          </marker>
        </defs>
      </svg>
      <div id="route-info"></div>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.hostname}:8765`;

/* ─────────────────────────────────────────────────────────────
 * 아키텍처 다이어그램
 * ───────────────────────────────────────────────────────────── */
const ARCH_NODES = {
  pub1: { x: 22,  y: 42,  label: 'Pub1', kind: 'pub'    },
  pub2: { x: 22,  y: 128, label: 'Pub2', kind: 'pub'    },
  b1:   { x: 105, y: 42,  label: 'B1',   kind: 'broker' },
  b2:   { x: 105, y: 128, label: 'B2',   kind: 'broker' },
  b3:   { x: 210, y: 42,  label: 'B3',   kind: 'broker' },
  b4:   { x: 210, y: 128, label: 'B4',   kind: 'broker' },
  sub:  { x: 292, y: 85,  label: 'Sub',  kind: 'sub'    },
};

const ARCH_EDGES = [
  { id: 'pub1-b1', from: 'pub1', to: 'b1', dash: true  },
  { id: 'pub1-b2', from: 'pub1', to: 'b2', dash: true  },
  { id: 'pub2-b1', from: 'pub2', to: 'b1', dash: true  },
  { id: 'pub2-b2', from: 'pub2', to: 'b2', dash: true  },
  { id: 'b1-b3',   from: 'b1',   to: 'b3', dash: false },
  { id: 'b1-b4',   from: 'b1',   to: 'b4', dash: false },
  { id: 'b2-b3',   from: 'b2',   to: 'b3', dash: false },
  { id: 'b2-b4',   from: 'b2',   to: 'b4', dash: false },
  { id: 'b3-sub',  from: 'b3',   to: 'sub', dash: true },
  { id: 'b4-sub',  from: 'b4',   to: 'sub', dash: true },
];

const NODE_COLORS = {
  pub: '#e67e22',
  sub: '#1a4a7a',
  broker: { unknown: '#3a3a3a', active: '#4caf50', inactive: '#f44336' }
};

const archState = {
  brokers:   { b1:'unknown', b2:'unknown', b3:'unknown', b4:'unknown' },
  camRoutes: {},
  subBroker: null,
};

function camToPub(camId) {
  return camId === 'pi1' ? 'pub1' : 'pub2';
}

function getActiveEdges() {
  const active = new Set();
  for (const [cam, route] of Object.entries(archState.camRoutes)) {
    const pub = camToPub(cam);
    active.add(`${pub}-${route.from}`);
    active.add(`${route.from}-${route.via}`);
    active.add(`${route.via}-sub`);
  }
  return active;
}

function updateDiagram() {
  const activeEdges = getActiveEdges();

  for (const e of ARCH_EDGES) {
    const el = document.getElementById(`edge-${e.id}`);
    if (!el) continue;
    const on = activeEdges.has(e.id);
    el.setAttribute('stroke', on ? '#4caf50' : '#2a2a2a');
    el.setAttribute('stroke-width', on ? '2' : '1');
    el.setAttribute('opacity', on ? '1' : '0.4');
    el.setAttribute('marker-end', on ? 'url(#arrow-active)' : 'url(#arrow)');
  }

  for (const [broker, status] of Object.entries(archState.brokers)) {
    const el = document.getElementById(`node-${broker}`);
    if (el) el.setAttribute('fill', NODE_COLORS.broker[status]);
  }

  const subEl = document.getElementById('node-sub');
  if (subEl) {
    const hasCam = Object.keys(archState.camRoutes).length > 0;
    subEl.setAttribute('fill', hasCam ? '#2196f3' : '#1a4a7a');
  }

  updateRouteInfo();
}

function updateRouteInfo() {
  const el = document.getElementById('route-info');
  el.innerHTML = '';
  const routes = Object.entries(archState.camRoutes);
  if (routes.length === 0) {
    el.innerHTML = '<div class="route-item"><span style="color:#333">경로 대기 중...</span></div>';
    return;
  }
  for (const [cam, route] of routes) {
    const div = document.createElement('div');
    div.className = 'route-item';
    div.innerHTML =
      `<span class="route-cam">${cam}</span>` +
      `<span class="route-path">${route.from} → ${route.via} → sub</span>`;
    el.appendChild(div);
  }
}

function buildArchSVG() {
  const svg = document.getElementById('arch-svg');
  const R = 15;

  for (const e of ARCH_EDGES) {
    const fn = ARCH_NODES[e.from];
    const tn = ARCH_NODES[e.to];
    const dx = tn.x - fn.x, dy = tn.y - fn.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const ux = dx/len, uy = dy/len;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('id', `edge-${e.id}`);
    line.setAttribute('x1', (fn.x + ux*R).toFixed(1));
    line.setAttribute('y1', (fn.y + uy*R).toFixed(1));
    line.setAttribute('x2', (tn.x - ux*(R+4)).toFixed(1));
    line.setAttribute('y2', (tn.y - uy*(R+4)).toFixed(1));
    line.setAttribute('stroke', '#2a2a2a');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('opacity', '0.4');
    if (e.dash) line.setAttribute('stroke-dasharray', '4,3');
    line.setAttribute('marker-end', 'url(#arrow)');
    svg.appendChild(line);
  }

  for (const [id, n] of Object.entries(ARCH_NODES)) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('id', `node-${id}`);
    circle.setAttribute('cx', n.x);
    circle.setAttribute('cy', n.y);
    circle.setAttribute('r', R);
    circle.setAttribute('fill',
      n.kind === 'pub' ? NODE_COLORS.pub :
      n.kind === 'sub' ? NODE_COLORS.sub :
      NODE_COLORS.broker.unknown);
    circle.setAttribute('stroke', '#111');
    circle.setAttribute('stroke-width', '1.5');
    g.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', n.x);
    text.setAttribute('y', n.y + 1);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('fill', '#eee');
    text.setAttribute('font-size', '9');
    text.setAttribute('font-weight', '600');
    text.setAttribute('font-family', 'monospace');
    text.setAttribute('pointer-events', 'none');
    text.textContent = n.label;
    g.appendChild(text);

    svg.appendChild(g);
  }
}

/* ─────────────────────────────────────────────────────────────
 * 카메라 셀
 * ───────────────────────────────────────────────────────────── */
const cameras = new Map();
const TARGET_FPS = 15;
const FRAME_MS   = 1000 / TARGET_FPS;

function updateGrid() {
  const n    = cameras.size;
  const grid = document.getElementById('cam-grid');
  if (n === 0) return;
  if (n === 1) {
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gridTemplateRows    = '1fr';
  } else if (n === 2) {
    grid.style.gridTemplateColumns = '1fr 1fr';
    grid.style.gridTemplateRows    = '1fr';
  } else {
    const cols = Math.ceil(Math.sqrt(n));
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${Math.ceil(n/cols)}, 1fr)`;
  }
}

function createCameraCell(camId) {
  const grid = document.getElementById('cam-grid');
  const cell = document.createElement('div');
  cell.className = 'cam-cell';
  cell.id = `cam-cell-${camId}`;
  cell.innerHTML = `
    <div class="cam-label">
      <span class="dot" id="dot-${camId}"></span>
      <span>${camId}</span>
    </div>
    <div class="cam-canvas-wrap">
      <span class="no-signal" id="nosig-${camId}">신호 없음</span>
      <canvas class="cam-canvas" id="canvas-${camId}"
              width="640" height="480"></canvas>
    </div>
    <div class="cam-stat">
      <span>FPS: <b id="fps-${camId}">—</b></span>
      <span>프레임: <b id="fcnt-${camId}">0</b></span>
      <span>크기: <b id="fsz-${camId}">—</b></span>
      <span>지연: <b id="fms-${camId}">—</b></span>
    </div>`;
  grid.appendChild(cell);

  const canvas = document.getElementById(`canvas-${camId}`);
  const state = {
    canvas, ctx: canvas.getContext('2d'),
    pendingFrame: null, rendering: false,
    lastRenderTime: 0, frameCount: 0, totalFrames: 0,
    fpsTimer: Date.now(),
    elFps:    document.getElementById(`fps-${camId}`),
    elFrames: document.getElementById(`fcnt-${camId}`),
    elSize:   document.getElementById(`fsz-${camId}`),
    elMs:     document.getElementById(`fms-${camId}`),
    elDot:    document.getElementById(`dot-${camId}`),
    elNoSig:  document.getElementById(`nosig-${camId}`),
  };
  cameras.set(camId, state);

  setInterval(() => {
    const elapsed = (Date.now() - state.fpsTimer) / 1000;
    state.elFps.textContent = elapsed > 0 ?
      (state.frameCount / elapsed).toFixed(1) : '—';
    state.frameCount = 0;
    state.fpsTimer   = Date.now();
  }, 1000);

  updateGrid();
  return state;
}

function getOrCreateCamera(camId) {
  return cameras.has(camId) ? cameras.get(camId) : createCameraCell(camId);
}

/* ─────────────────────────────────────────────────────────────
 * 프레임 렌더링
 * ───────────────────────────────────────────────────────────── */
async function renderFrame(state, arrayBuffer) {
  const t0 = performance.now();
  try {
    const blob   = new Blob([arrayBuffer], { type: 'image/jpeg' });
    const bitmap = await createImageBitmap(blob);
    if (state.canvas.width  !== bitmap.width ||
        state.canvas.height !== bitmap.height) {
      state.canvas.width  = bitmap.width;
      state.canvas.height = bitmap.height;
    }
    state.ctx.drawImage(bitmap, 0, 0);
    bitmap.close();
    state.elNoSig.style.display = 'none';
    state.canvas.style.display  = 'block';
    state.frameCount++;
    state.totalFrames++;
    state.elFrames.textContent = state.totalFrames;
    state.elSize.textContent   = (arrayBuffer.byteLength/1024).toFixed(1)+' KB';
    state.elMs.textContent     = (performance.now()-t0).toFixed(1)+' ms';
  } catch(e) {
    console.warn('Frame decode error:', e);
  } finally {
    if (state.pendingFrame) {
      const next = state.pendingFrame;
      state.pendingFrame = null;
      renderFrame(state, next);
    } else {
      state.rendering = false;
    }
  }
}

function onFrame(camId, arrayBuffer) {
  const state = getOrCreateCamera(camId);
  const now   = performance.now();
  if (now - state.lastRenderTime < FRAME_MS) {
    state.pendingFrame = arrayBuffer; return;
  }
  state.lastRenderTime = now;
  if (!state.rendering) {
    state.rendering = true;
    renderFrame(state, arrayBuffer);
  } else {
    state.pendingFrame = arrayBuffer;
  }
}

function parseBinaryFrame(arrayBuffer) {
  const view  = new Uint8Array(arrayBuffer);
  const idLen = view[0];
  const camId = String.fromCharCode(...view.slice(1, 1 + idLen));
  const jpeg  = arrayBuffer.slice(1 + idLen);
  return { camId, jpeg };
}

/* ─────────────────────────────────────────────────────────────
 * 이벤트 로그
 * ───────────────────────────────────────────────────────────── */
function addEvent(cls, text) {
  const evLog = document.getElementById('event-log');
  const now   = new Date().toLocaleTimeString();
  const div   = document.createElement('div');
  div.className = `ev ${cls}`;
  div.innerHTML = `<div>${text}</div><div class="time">${now}</div>`;
  evLog.prepend(div);
  if (evLog.children.length > 100) evLog.removeChild(evLog.lastChild);
}

/* ─────────────────────────────────────────────────────────────
 * WS 메시지 처리
 * ───────────────────────────────────────────────────────────── */
function handleTextMessage(json) {
  let msg;
  try { msg = JSON.parse(json); } catch(e) { return; }

  const cam  = msg.cam  || '?';
  const type = msg.type || '';
  const data = msg.data || '';
  const from = msg.from || '';
  const via  = msg.via  || '';

  if (type === 'route') {
    const prev = archState.camRoutes[cam];
    const prevPath = prev ? `${prev.from}→${prev.via}` : null;
    archState.camRoutes[cam] = { from: msg.from, via: msg.via };
    archState.brokers[msg.from] = 'active';
    archState.brokers[msg.via]  = 'active';
    updateDiagram();
    if (prevPath && prevPath !== `${msg.from}→${msg.via}`)
      addEvent('route', `[${cam}] 경로 변경: ${prevPath} → ${msg.from}→${msg.via}`);
    return;
  }

  if (type === 'broker_status') {
    archState.brokers[msg.broker] = msg.active ? 'active' : 'inactive';
    updateDiagram();
    if (!msg.active) addEvent('offline', `[${msg.broker}] 브로커 다운`);
    else             addEvent('online',  `[${msg.broker}] 브로커 복구`);
    return;
  }

  if (type === 'sub_connected') {
    archState.subBroker = msg.broker.toLowerCase();
    archState.brokers[archState.subBroker] = 'active';
    updateDiagram();
    return;
  }

  if (type === 'event') {
    getOrCreateCamera(cam);
    const name = (typeof data === 'object' && data.event) ? data.event : '이벤트';
    const pathStr = (from && via) ? ` (${from}→${via})` : '';
    addEvent('motion', `[${cam}] ${name} 감지${pathStr}`);

  } else if (type === 'status') {
    getOrCreateCamera(cam);
    const state  = cameras.get(cam);
    const online = (data === 'online' ||
                   (typeof data === 'object' && data.status === 'online'));
    if (online) {
      addEvent('online',  `[${cam}] 온라인`);
      if (state) state.elDot.className = 'dot live';
    } else {
      addEvent('offline', `[${cam}] 오프라인`);
      if (state) state.elDot.className = 'dot err';
      delete archState.camRoutes[cam];
      updateDiagram();
    }
  }
}

/* ─────────────────────────────────────────────────────────────
 * WebSocket
 * ───────────────────────────────────────────────────────────── */
const wsBadge = document.getElementById('ws-badge');

function connect() {
  const ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    wsBadge.textContent = 'WS 연결됨';
    wsBadge.className   = 'badge live';
  };

  ws.onmessage = ({ data }) => {
    if (data instanceof ArrayBuffer) {
      const { camId, jpeg } = parseBinaryFrame(data);
      onFrame(camId, jpeg);
    } else {
      handleTextMessage(data);
    }
  };

  ws.onclose = () => {
    wsBadge.textContent = 'WS 끊김 — 재연결 중...';
    wsBadge.className   = 'badge err';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

buildArchSVG();
updateRouteInfo();
connect();
</script>
</body>
</html>
