<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    header h1 { font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; }
    .badge {
      font-size: 0.72rem; padding: 2px 8px;
      border-radius: 10px; background: #2a2a2a; color: #888;
    }
    .badge.live { background: #0a2a0a; color: #4caf50; }
    .badge.err  { background: #2a0a0a; color: #f44336; }
    #ws-badge { margin-left: auto; }
    .main {
      display: flex; flex: 1; overflow: hidden;
      gap: 1px; background: #222;
    }
    .video-wrap {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      background: #111; position: relative;
    }
    canvas#screen { max-width: 100%; max-height: 100%; display: block; }
    #no-signal { position: absolute; color: #444; font-size: 0.85rem; }
    .event-panel {
      width: 260px; background: #111;
      display: flex; flex-direction: column;
      border-left: 1px solid #2a2a2a; flex-shrink: 0;
    }
    .event-panel h2 {
      font-size: 0.75rem; font-weight: 500; color: #666;
      padding: 8px 12px; border-bottom: 1px solid #1e1e1e;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    #event-log { flex: 1; overflow-y: auto; padding: 4px 0; }
    .ev {
      padding: 6px 12px; border-bottom: 1px solid #1a1a1a;
      font-size: 0.75rem; line-height: 1.4;
    }
    .ev .time { color: #444; font-size: 0.68rem; margin-top: 1px; }
    .ev.motion  { border-left: 2px solid #ff9800; }
    .ev.offline { border-left: 2px solid #f44336; }
    .ev.online  { border-left: 2px solid #4caf50; }
    #event-log::-webkit-scrollbar { width: 3px; }
    #event-log::-webkit-scrollbar-thumb { background: #333; }
    .stat-bar {
      display: flex; gap: 16px; padding: 5px 16px;
      background: #1a1a1a; border-top: 1px solid #2a2a2a;
      font-size: 0.72rem; color: #555; flex-shrink: 0;
    }
    .stat-bar span b { color: #888; }
  </style>
</head>
<body>

<header>
  <h1>CCTV Monitor</h1>
  <span class="badge" id="cam-badge">카메라 —</span>
  <span class="badge" id="broker-badge">브로커 —</span>
  <span class="badge" id="ws-badge">연결 중...</span>
</header>

<div class="main">
  <div class="video-wrap">
    <span id="no-signal">신호 없음</span>
    <canvas id="screen" width="640" height="480"></canvas>
  </div>
  <div class="event-panel">
    <h2>Event Log</h2>
    <div id="event-log"></div>
  </div>
</div>

<div class="stat-bar">
  <span>FPS: <b id="fps-val">—</b></span>
  <span>프레임: <b id="frame-cnt">0</b></span>
  <span>크기: <b id="frame-size">—</b></span>
  <span>지연: <b id="render-ms">—</b></span>
</div>

<script>
const WS_URL = `ws://${location.hostname}:8765`;

const canvas   = document.getElementById('screen');
const ctx      = canvas.getContext('2d');
const noSignal = document.getElementById('no-signal');
const evLog    = document.getElementById('event-log');
const wsBadge  = document.getElementById('ws-badge');
const camBadge = document.getElementById('cam-badge');
const brokerBadge = document.getElementById('broker-badge');

/* ─────────────────────────────────────────────────────────────
 * 실시간 프레임 렌더링
 *
 * 핵심 전략: "최신 프레임만 그린다"
 *   - pendingFrame: 대기 중인 최신 ArrayBuffer
 *   - rendering: 현재 decode 중인지 여부
 *
 * 새 프레임이 오면:
 *   - rendering 중이 아니면 → 즉시 렌더링 시작
 *   - rendering 중이면 → pendingFrame 교체 (이전 대기 프레임 버림)
 *
 * 이 방식으로 프레임이 큐에 쌓여 오래된 것이 나오는 문제를 방지한다.
 * ───────────────────────────────────────────────────────────── */
/* 목표 FPS — publisher의 CAM_FPS와 맞춤 */
const TARGET_FPS   = 15;
const FRAME_MS     = 1000 / TARGET_FPS;  /* 프레임 간격 약 66ms */
let lastRenderTime = 0;

let pendingFrame = null;
let rendering    = false;

let frameCount  = 0;
let totalFrames = 0;
let fpsTimer    = Date.now();

setInterval(() => {
  const elapsed = (Date.now() - fpsTimer) / 1000;
  document.getElementById('fps-val').textContent =
    elapsed > 0 ? (frameCount / elapsed).toFixed(1) : '—';
  frameCount = 0;
  fpsTimer   = Date.now();
}, 1000);

async function renderFrame(arrayBuffer) {
  const t0 = performance.now();
  try {
    const blob   = new Blob([arrayBuffer], { type: 'image/jpeg' });
    const bitmap = await createImageBitmap(blob);

    if (canvas.width  !== bitmap.width ||
        canvas.height !== bitmap.height) {
      canvas.width  = bitmap.width;
      canvas.height = bitmap.height;
    }

    ctx.drawImage(bitmap, 0, 0);
    bitmap.close();

    noSignal.style.display = 'none';
    canvas.style.display   = 'block';

    frameCount++;
    totalFrames++;
    document.getElementById('frame-cnt').textContent = totalFrames;
    document.getElementById('frame-size').textContent =
      (arrayBuffer.byteLength / 1024).toFixed(1) + ' KB';
    document.getElementById('render-ms').textContent =
      (performance.now() - t0).toFixed(1) + ' ms';

  } catch (e) {
    console.warn('Frame decode error:', e);
  } finally {
    /*
     * 렌더링 완료 후 대기 중인 최신 프레임이 있으면 바로 처리.
     * 없으면 rendering = false로 대기 상태 복귀.
     */
    if (pendingFrame) {
      const next = pendingFrame;
      pendingFrame = null;
      renderFrame(next);
    } else {
      rendering = false;
    }
  }
}

function onFrame(arrayBuffer) {
  const now = performance.now();

  /*
   * FPS 제한 — TARGET_FPS 이상으로 빠르게 오는 프레임은 버린다.
   * Publisher가 15fps로 보내도 WebSocket 버퍼에 쌓였다가
   * 한꺼번에 처리되면 빨리감기처럼 보이는 문제를 방지한다.
   */
  if (now - lastRenderTime < FRAME_MS) {
    pendingFrame = arrayBuffer;  /* 최신 프레임으로 교체만 해두고 버림 */
    return;
  }
  lastRenderTime = now;

  if (!rendering) {
    rendering = true;
    renderFrame(arrayBuffer);
  } else {
    /* 렌더링 중 — 이전 대기 프레임 버리고 최신으로 교체 */
    pendingFrame = arrayBuffer;
  }
}

/* ─────────────────────────────────────────────────────────────
 * 이벤트/상태 처리
 * ───────────────────────────────────────────────────────────── */
function addEvent(cls, text) {
  const now = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = `ev ${cls}`;
  div.innerHTML = `<div>${text}</div><div class="time">${now}</div>`;
  evLog.prepend(div);
  if (evLog.children.length > 80)
    evLog.removeChild(evLog.lastChild);
}

function handleEvent(json) {
  let msg;
  try { msg = JSON.parse(json); } catch(e) {
    console.warn('JSON parse error:', json, e);
    return;
  }

  const cam  = msg.cam  || '?';
  const type = msg.type || '';
  const data = msg.data || '';

  if (type === 'event') {
    const evtName = (typeof data === 'object' && data.event) ? data.event : '이벤트';
    addEvent('motion', `[${cam}] ${evtName} 감지`);

  } else if (type === 'status') {
    const isOnline = (data === 'online' ||
                      (typeof data === 'object' && data.status === 'online'));
    if (isOnline) {
      addEvent('online', `[${cam}] 온라인`);
      camBadge.textContent = `${cam} LIVE`;
      camBadge.className   = 'badge live';
    } else {
      /* 오프라인 시 캔버스 건드리지 않음 — 마지막 프레임 유지 */
      addEvent('offline', `[${cam}] 오프라인`);
      camBadge.textContent = `${cam} OFFLINE`;
      camBadge.className   = 'badge err';
    }
  }
}

/* ─────────────────────────────────────────────────────────────
 * WebSocket 연결 (자동 재연결)
 * ───────────────────────────────────────────────────────────── */
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    wsBadge.textContent = 'WS 연결됨';
    wsBadge.className   = 'badge live';
  };

  ws.onmessage = ({ data }) => {
    if (data instanceof ArrayBuffer) {
      onFrame(data);
    } else {
      handleEvent(data);
    }
  };

  ws.onclose = () => {
    wsBadge.textContent = 'WS 끊김 — 재연결 중...';
    wsBadge.className   = 'badge err';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
